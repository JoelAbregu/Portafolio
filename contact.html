      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <title>Contacto - Portafolio - Joel Abregu</title>
  </head>
  <body>
    <!--==================== HEADER ====================-->
    <header class="header header-pages" id="header">
      <nav class="nav container">
        <a href="index.html" class="nav__logo">Joel</a>
        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li class="nav__item">
              <a href="index.html" class="nav__link">Inicio</a>
            </li>

            <li class="nav__item">
              <a href="about.html" class="nav__link">Sobre mi</a>
            </li>

            <li class="nav__item">
              <a href="work.html" class="nav__link">Portafolio</a>
            </li>

            <li class="nav__item">
              <a href="contact.html" class="button">Contactame</a>
            </li>
          </ul>

          <!-- Close button-->
          <div class="nav__close" id="nav-close">
            <i class="ri-close-fill"></i>
          </div>
        </div>

        <div class="nav__actions">
          <!-- Theme button-->
          <i class="ri-moon-line change-theme" id="theme-button"></i>
          <!-- Toggle button-->
          <div class="nav__toggle" id="nav-toggle">
            <i class="ri-apps-2-line"></i>
          </div>
        </div>
      </nav>
    </header>

    <!--==================== MAIN ====================-->
    <main class="main">
      <!--==================== CONTACT ====================-->
      <section class="contact section">
        <h2 class="section__title">
          Hablemos <br />
           Acerca de tu proyecto
        </h2>
        <div class="contact__page container grid">
          <form action="" class="contact__form grid" id="contact-form">
            <div class="contact__group grid">
              <div class="contact__box">
                <input
                  type="text"
                  name="user_name"
                  id="name"
                  required
                  placeholder="Escribe tu nombre y apellido"
                  class="contact__input"
                />
                <label for="name" class="contact__label">Nombre y apellido</label>
              </div>

              <div class="contact__box">
                <input
                  type="email"
                  name="user_email"
                  id="email"
                  required
                  placeholder="Escribe tu email"
                  class="contact__input"
                />
                <label for="email" class="contact__label">Email</label>
              </div>
            </div>
            <div class="contact__box contact__area">
              <textarea
                name="user_message"
                id="message"
                required
                placeholder="Escribe tu mensaje"
                class="contact__input"
              ></textarea>
              <label for="message" class="contact__label">Mensaje</label>
            </div>

            <p class="contact__message" id="contact-message"></p>

            <button type="submit" class="contact__send button">
              Enviar Mensaje
            </button>
          </form>
        </div>
      </section>
    </main>

    <!--==================== FOOTER ====================-->
    <footer class="footer">
      <div class="footer__container container grid">
        <div class="footer__content grid">
          <a href="index.html" class="footer__logo">Joel</a>
          <ul class="footer__links">
            <li>
              <a href="about.html" class="footer__link">Sobre mi</a>
            </li>

            <li>
              <a href="work.html" class="footer__link">Portafolio</a>
            </li>

            <li>
              <a href="contact.html" class="footer__link">Contactame</a>
            </li>
          </ul>

          <div class="footer__social">
            <a
              href="#"
              target="_blank"
              class="footer__social-link"
            >
              <i class="ri-facebook-circle-fill"></i
            ></a>
            <a
              href="#"
              target="_blank"
              class="footer__social-link"
            >
              <i class="ri-instagram-fill"></i>
            </a>
            <a
              href="https://api.whatsapp.com/send?phone=51977470126&text=Vengo%20de%20visitar%20tu%20pagina%20web"
              target="_blank"
              class="footer__social-link"
            >
              <i class="ri-whatsapp-fill"></i
            ></a>
            <a
              href="https://www.linkedin.com/in/abregu-manrique-finnes-joel-877098239/"
              target="_blank"
              class="footer__social-link"
            >
              <i class="ri-linkedin-box-fill"></i
            ></a>
          </div>
          <span class="footer__copy">
            &#169; Todos los derechos reservados por Joel Abregu
          </span>
        </div>
      </div>
    </footer>
    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>

    <!--=============== EMAIL JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!--=============== CONTACT JS ===============-->
    <script src="assets/js/contact.js"></script>
  </body>
</html>
